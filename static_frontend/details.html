<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* —————————— Base Styles —————————— */
        body {
            background-color: #141414;
            color: #fff;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* —————————— Backdrop —————————— */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            z-index: -1;
        }

        .backdrop::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        /* —————————— Details Section —————————— */
        .details-container {
            text-align: center;
        }

        .genre-pill {
            display: inline-block;
            padding: 0.4em 0.75em;
            font-size: 0.85em;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            text-align: center;
            white-space: nowrap;
            vertical-align: baseline;
            border-radius: 50rem;
            background-color: #333;
            cursor: pointer;
            transition: background-color 0.3s;
            margin: 0.25rem;
            text-decoration: none;
        }

        .genre-pill:hover {
            background-color: #e50914;
            color: #fff;
        }

        .logo-btn {
            margin: 0 10px;
            transition: transform 0.3s;
            display: inline-block;
            vertical-align: middle;
        }

        .logo-btn:hover {
            transform: scale(1.1);
        }

        .logo-btn img {
            width: 50px;
            height: auto;
        }

        /* —————————— Cast & Director Grids —————————— */
        .person-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .person-thumb {
            position: relative;
            display: block;
            text-align: center;
            text-decoration: none;
            color: #fff;
            border-radius: 10px;
            overflow: hidden;
            background-color: #222;
            cursor: pointer;
        }

        .person-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* —————————— Seasons Grid —————————— */
        .seasons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .season-tile {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 10px;
        }

        .season-tile img {
            width: 100%;
            height: auto;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .season-tile:hover img {
            transform: scale(1.1);
        }

        .season-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            color: white;
            text-align: center;
        }

        /* —————————— File List (in Modal) —————————— */
        .file-list {
            list-style: none;
            padding: 0;
        }

        .file-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.25rem;
            background-color: #222;
            border: 1px solid #333;
            margin-bottom: -1px;
            transition: background-color 0.3s;
            gap: 10px;
        }

        .file-item:hover {
            background-color: #333;
        }

        .file-item span {
            word-break: break-all;
            flex-grow: 1;
        }

        .file-item .btn {
            margin-top: 10px;
        }

        .file-item div {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Responsive adjustments for file items */
        @media (min-width: 576px) {
            .file-item {
                flex-wrap: nowrap;
            }

            .file-item .btn {
                margin-top: 0;
                margin-left: 10px;
            }
        }

        /* —————————— Modal Styles —————————— */
        .modal {
            position: fixed;
            z-index: 1050;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        .modal-content {
            background-color: #1f1f1f;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            border-radius: 10px;
        }

        /* —————————— Buttons & Interactive Elements —————————— */
        .btn-danger,
        .btn-danger:focus,
        .btn-danger:active {
            background-color: #e50914 !important;
            border-color: #e50914 !important;
            box-shadow: none !important;
        }

        .btn-danger:hover {
            background-color: #b20710 !important;
            border-color: #b20710 !important;
        }

        .btn-success, .play-btn {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .close-btn {
            background-color: #e50914 !important;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1rem;
            transition: transform 0.2s, background 0.3s;
        }

        .close-btn:hover {
            transform: scale(1.05);
            background-color: #b20710 !important;
        }

        /* —————————— Pagination —————————— */
        .pagination .page-link {
            background-color: #222;
            border-color: #333;
            color: #fff;
        }

        .pagination .page-item.active .page-link {
            background-color: #e50914 !important;
            border: none;
        }

        /* —————————— Loader —————————— */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #e50914;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .loader-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        .btn-loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        /* —————————— Tile Loading Overlay —————————— */
        .tile-loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .tile-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #e50914;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <!-- Backdrop element for blurred background -->
    <div class="backdrop"></div>

    <!-- Main container -->
    <div class="container mt-4">

        <!-- Container for media details -->
        <div id="details-container" class="details-container">
            <!-- Details will be rendered here by JavaScript -->
        </div>

        <!-- Modal for displaying files -->
        <div id="file-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Found results</h2>
                </div>
                <div class="modal-body">
                    <!-- File list and pagination for the modal -->
                    <ul id="file-list" class="file-list mt-4"></ul>
                    <nav aria-label="Page navigation">
                        <ul id="pagination" class="pagination justify-content-center mt-4"></ul>
                    </nav>
                    <div class="d-flex justify-content-center mt-2">
                        <input type="number" id="page-input" class="form-control" style="width: 100px;"
                            placeholder="Page">
                        <button id="goto-page" class="btn btn-danger ms-2">Go</button>
                    </div>
                </div>
                <div class="modal-footer text-center mt-3">
                    <button type="button" class="btn btn-danger close-btn" onclick="closeModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // —————————————— DOM Elements & State ——————————————
        const token = localStorage.getItem('authToken');

        // —————————————— Authorization ——————————————
        /**
         * Verifies the user's authorization status with the server.
         * @returns {Promise<boolean>} True if authorized, false otherwise.
         */
        async function verifyAuth() {
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/api/user/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                    return false;
                }
                return response.ok;
            } catch (error) {
                console.error('Auth verification failed:', error);
                return false;
            }
        }

        const authHeader = { 'Authorization': `Bearer ${token}` };

        // —————————————— URL Parameters & State ——————————————
        const urlParams = new URLSearchParams(window.location.search);
        const tmdbId = urlParams.get('tmdb_id');
        const tmdbType = urlParams.get('tmdb_type');
        let totalPages = 1;
        let currentSeason = null;

        // —————————————— API Functions ——————————————
        /**
         * Fetches data with authorization headers and handles 401 errors.
         * @param {string} url - The URL to fetch from.
         * @param {object} options - Fetch options.
         * @param {boolean} showLoader - Whether to show the global loader.
         * @returns {Promise<Response>} - The fetch response.
         */
        async function fetchWithAuth(url, options = {}, showLoader = true) {
            try {
                const response = await fetch(url, { ...options, headers: { ...options.headers, ...authHeader } });
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                }
                return response;
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        /**
         * Fetches and renders the main media details.
         */
        async function fetchAndRenderDetails() {
            document.getElementById('details-container').innerHTML = '<div class="loader-wrapper"><div class="loader"></div></div>';
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/api/media/${tmdbId}?tmdb_type=${tmdbType}`);
                if (response.ok) {
                    const data = await response.json();
                    renderDetails(data);
                    // If it's a TV show, render the seasons grid
                    if (data.tmdb_type === 'tv') {
                        renderSeasons(data.seasons);
                    } else if (data.tmdb_type === 'movie') {
                        renderMovieTile(data.poster_path);
                    }
                } else {
                    console.error('Failed to fetch details');
                }
            } catch (error) {
                console.error('Error fetching details:', error);
            }
        }

        /**
         * Fetches the files for a given movie or TV show season.
         * @param {number} page - The page number to fetch.
         * @param {number|null} seasonNumber - The season number (for TV shows).
         */
        async function fetchFiles(page = 1, seasonNumber = null) {
            document.getElementById('file-list').innerHTML = '<div class="loader-wrapper"><div class="loader"></div></div>';
            try {
                let url;
                if (tmdbType === 'tv' && seasonNumber) {
                    url = `${API_BASE_URL}/api/media/${tmdbId}/season/${seasonNumber}?page=${page}`;
                } else if (tmdbType === 'movie') {
                    url = `${API_BASE_URL}/api/media/${tmdbId}?tmdb_type=movie&page=${page}`;
                } else {
                    return; // Don't fetch for TV shows without a season
                }

                const response = await fetchWithAuth(url);
                if (response.ok) {
                    const data = await response.json();
                    let files, total, current;

                    if (tmdbType === 'tv') {
                        files = data.files;
                        total = data.total_pages;
                        current = data.current_page;
                        document.getElementById('modal-title').textContent = `Found ${data.total_files} files for Season ${seasonNumber}`;
                    } else {
                        files = data.files;
                        total = data.total_pages;
                        current = data.current_page;
                        document.getElementById('modal-title').textContent = `Found ${data.total_files} files`;
                    }

                    totalPages = total;
                    displayFiles(files);
                    setupPagination(total, current, seasonNumber);

                    document.getElementById('file-modal').scrollTop = 0;
                    openModal();
                } else {
                    console.error('Failed to fetch files');
                }
            } catch (error) {
                console.error('Error fetching files:', error);
            }
        }

        /**
         * Sends a file to the user's Telegram.
         * @param {string} fileId - The ID of the file to send.
         * @param {HTMLElement} button - The button that was clicked.
         */
        async function sendFile(fileId, button) {
            const originalText = button.textContent;
            button.disabled = true;
            button.innerHTML = '<div class="btn-loader"></div>';

            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/api/send_file`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file_id: fileId })
                }, false);

                if (response.ok) {
                    button.textContent = 'Sent!';
                    button.classList.remove('btn-danger');
                    button.classList.add('btn-secondary');
                } else {
                    button.disabled = false;
                    button.textContent = originalText;
                    if (response.status === 400 || response.status === 403 || response.status === 429) {
                        const errorData = await response.json();
                        alert(errorData.detail || 'Failed to send file. Please contact support.');
                        if (response.status === 429) button.disabled = true;
                    } else {
                        console.error('Failed to send file');
                        alert('Failed to send file. Please contact support.');
                    }
                }
            } catch (error) {
                button.disabled = false;
                button.textContent = originalText;
                console.error('Error sending file:', error);
                alert('An error occurred. Please contact support.');
            }
        }

        // —————————————— UI Rendering Functions ——————————————
        /**
         * Renders the main media details on the page.
         * @param {object} details - The media details object.
         */
        function renderDetails(details) {
            const detailsContainer = document.getElementById('details-container');
            const backdrop = document.querySelector('.backdrop');
            backdrop.style.backgroundImage = `url('${POSTER_BASE_URL}${details.poster_path}')`;

            // Generate HTML for genres, cast, and directors
            const genresHtml = (details.genres || []).map(genre => `<a href="index.html?genre=${genre._id}" class="genre-pill">${genre.name}</a>`).join('');
            const castHtml = (details.cast || []).map(person => `
                <div class="person-thumb" onclick="window.location.href='index.html?cast=${person._id}'">
                    <img src="${person.profile_path ? `${POSTER_BASE_URL}${person.profile_path}` : 'https://i.ibb.co/qzmwLvx/No-Image-Available.jpg'}" loading="lazy">
                </div>`).join('');
            const directorsHtml = (details.directors || []).map(person => `
                <div class="person-thumb" onclick="window.location.href='index.html?director=${person._id}'">
                    <img src="${person.profile_path ? `${POSTER_BASE_URL}${person.profile_path}` : 'https://i.ibb.co/qzmwLvx/No-Image-Available.jpg'}" loading="lazy">
                </div>`).join('');
                
            // Set the innerHTML of the details container
            detailsContainer.innerHTML = `
                <div class="row">
                    <div class="col-md-4">
                        <img src="${POSTER_BASE_URL}${details.poster_path}" class="img-fluid" style="border-radius: 10px;">
                    </div>
                    <div class="col-md-8">
                        <h1>${details.title}</h1>
                        <p><b>Year:</b> ${details.year}</p>
                        <p><b>Rating:</b> ⭐ ${details.rating ?? 'N/A'}${details.rating ? '/10' : ''}</p>
                        <div>${genresHtml}</div>
                        <p class="mt-3">${details.plot}</p>
                        ${details.trailer_url ? `<a href="${details.trailer_url}" class="logo-btn" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/f/fd/YouTube_full-color_icon_%282024%29.svg" alt="Trailer"></a>` : ''}
                        ${details.imdb_id ? `<a href="https://www.imdb.com/title/${details.imdb_id}" class="logo-btn" target="_blank"><img src="https://upload.wikimedia.org/wikipedia/commons/6/69/IMDB_Logo_2016.svg" alt="IMDb"></a>` : ''}
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-12"><h3>Cast</h3><div class="person-grid">${castHtml}</div></div>
                </div>
                <div class="row mt-4">
                    <div class="col-12"><h3>${details.tmdb_type === 'tv' ? 'Creators' : 'Directors'}</h3><div class="person-grid">${directorsHtml}</div></div>
                </div>
            `;
        }


        /**
         * Renders a single movie tile in a grid.
         * @param {string} posterPath - The path to the movie poster.
         */
        function renderMovieTile(posterPath) {
            const movieContainer = document.createElement('div');
            movieContainer.className = 'seasons-grid mt-4';

            const movieTile = document.createElement('div');
            movieTile.className = 'season-tile';
            movieTile.innerHTML = `
                <div class="tile-loading-overlay"><div class="tile-spinner"></div></div>
                <img src="${posterPath ? `${POSTER_BASE_URL}${posterPath}` : 'https://i.ibb.co/qzmwLvx/No-Image-Available.jpg'}" loading="lazy">
            `;
            movieTile.onclick = async () => {
                const overlay = movieTile.querySelector('.tile-loading-overlay');
                overlay.style.display = 'flex';
                try {
                    await fetchFiles(1, null);
                } finally {
                    overlay.style.display = 'none';
                }
            };
            movieContainer.appendChild(movieTile);

            const detailsContainer = document.getElementById('details-container');
            const firstRow = detailsContainer.querySelector('.row');
            firstRow.insertAdjacentElement('afterend', movieContainer);
        }

        /**
         * Renders the seasons grid for TV shows.
         * @param {Array} seasons - An array of season objects.
         */
        function renderSeasons(seasons) {
            const seasonsContainer = document.createElement('div');
            seasonsContainer.className = 'seasons-grid mt-4';

            seasons.forEach(season => {
                const seasonTile = document.createElement('div');
                seasonTile.className = 'season-tile';
                seasonTile.innerHTML = `
                    <div class="tile-loading-overlay"><div class="tile-spinner"></div></div>
                    <img src="${season.poster_path ? `${POSTER_BASE_URL}${season.poster_path}` : 'https://i.ibb.co/qzmwLvx/No-Image-Available.jpg'}" loading="lazy">
                    <div class="season-info">
                        <h6>Season ${season.season_number}</h6>
                        <small>${season.episode_count} Episodes</small>
                    </div>`;
                seasonTile.onclick = async () => {
                    const overlay = seasonTile.querySelector('.tile-loading-overlay');
                    overlay.style.display = 'flex';
                    currentSeason = season.season_number;
                    try {
                        await fetchFiles(1, currentSeason);
                    } finally {
                        overlay.style.display = 'none';
                    }
                };
                seasonsContainer.appendChild(seasonTile);
            });

            const detailsContainer = document.getElementById('details-container');
            const firstRow = detailsContainer.querySelector('.row');
            firstRow.insertAdjacentElement('afterend', seasonsContainer);
        }

        /**
         * Displays the files in the modal.
         * @param {Array} files - An array of file objects.
         */
        function displayFiles(files) {
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = ''; // Clear previous list
            files.forEach(file => {
                const item = document.createElement('li');
                item.className = 'file-item';
                item.tabIndex = 0;
                item.innerHTML = `
                    <span>${file.file_name}</span>
                    <div>
                        <button class="btn btn-success play-btn" data-id="${file._id}" data-url="${file.stream_url}">Play</button>
                        <button class="btn btn-danger" onclick="sendFile('${file._id}', this)">Send</button>
                    </div>`;
                fileList.appendChild(item);

            });
        }

        /**
         * Sets up the pagination for the file list in the modal.
         * @param {number} totalPages - The total number of pages.
         * @param {number} currentPage - The current page number.
         * @param {number|null} seasonNumber - The season number (for TV shows).
         */
        function setupPagination(totalPages, currentPage, seasonNumber) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';

            if (currentPage > 1) {
                const prev = document.createElement('li');
                prev.className = 'page-item';
                prev.innerHTML = `<a class="page-link" href="#" onclick="fetchFiles(${currentPage - 1}, ${seasonNumber})">Previous</a>`;
                pagination.appendChild(prev);
            }

            if (totalPages > 0) {
                const pageIndicator = document.createElement('li');
                pageIndicator.className = 'page-item active';
                pageIndicator.innerHTML = `<span class="page-link">${currentPage} / ${totalPages}</span>`;
                pagination.appendChild(pageIndicator);
            }

            if (currentPage < totalPages) {
                const next = document.createElement('li');
                next.className = 'page-item';
                next.innerHTML = `<a class="page-link" href="#" onclick="fetchFiles(${currentPage + 1}, ${seasonNumber})">Next</a>`;
                pagination.appendChild(next);
            }
        }

        // —————————————— Person Tile Functions ——————————————
        function clearActivePeople() {
            document.querySelectorAll('.person-thumb.active').forEach(el => el.classList.remove('active'));
        }

        function toggleActivePerson(el) {
            const isActive = el.classList.contains('active');
            clearActivePeople();
            if (!isActive) el.classList.add('active');
        }

        // —————————————— Modal Functions ——————————————
        function openModal() {
            document.body.style.overflow = 'hidden';
            const modal = document.getElementById('file-modal');
            modal.style.display = 'block';
            modal.scrollTop = 0;
            modal.focus();
        }

        function closeModal() {
            document.body.style.overflow = '';
            document.getElementById('file-modal').style.display = 'none';
        }

        // —————————————— Event Listeners ——————————————
        const pageInput = document.getElementById('page-input');
        const gotoPageBtn = document.getElementById('goto-page');

        function goToPage() {
            const page = parseInt(pageInput.value);
            if (!isNaN(page) && page > 0 && page <= totalPages) {
                fetchFiles(page, currentSeason);
            }
        }

        gotoPageBtn.addEventListener('click', goToPage);
        pageInput.addEventListener('keyup', (event) => {
            if (event.key === 'Enter') {
                goToPage();
            }
        });

        // Handle play button clicks
        document.getElementById('file-list').addEventListener('click', async (e) => {
            if (e.target.classList.contains('play-btn')) {
                const button = e.target;
                const fileId = button.getAttribute('data-id');
                const url = button.getAttribute('data-url');
                
                if (!fileId || !url) return;

                const originalText = button.textContent;
                button.disabled = true;
                button.innerHTML = '<div class="btn-loader"></div>';

                try {
                    const response = await fetchWithAuth(`${API_BASE_URL}/api/track_play`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file_id: fileId })
                    }, false);

                    if (response.ok) {
                        button.textContent = 'Opening...';
                        button.classList.remove('btn-success');
                        button.classList.add('btn-secondary');
                        window.location.href = url;
                    } else {
                        button.disabled = false;
                        button.textContent = originalText;
                        if (response.status === 429) {
                            const errorData = await response.json();
                            alert(errorData.detail || 'You have reached your daily limit.');
                            button.disabled = true;
                        } else {
                            const errorData = await response.json();
                            alert(errorData.detail || 'Failed to track play. Please contact support.');
                        }
                    }
                } catch (error) {
                    button.disabled = false;
                    button.textContent = originalText;
                    console.error('Error tracking play:', error);
                    alert('An error occurred. Please contact support.');
                }
            }
        });

        // Disable right-click/long-press menu globally
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        }, false);

        // —————————————— Initial Load ——————————————
        verifyAuth().then(authorized => {
            if (authorized) {
                fetchAndRenderDetails();
            }
        });
    </script>
</body>

</html>
