
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* —————————— Base Styles —————————— */
        body {
            background-image: url('https://image.tmdb.org/t/p/original/2746UvsbkZINd873Yd3o3TxOwCP.jpg');
            background-color: #141414;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* —————————— Login Container —————————— */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background-color: #222;
            border-radius: 10px;
        }
        
        /* —————————— Form Styles —————————— */
        .form-control {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }
        
        .btn-primary {
            background-image: linear-gradient(to right, #e50914, #f40612);
            border: none;
        }

        /* —————————— Loader —————————— */
        .btn-loader {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="text-center mb-4">Login</h1>
        
        <!-- Step 1: Request OTP -->
        <form id="request-otp-form">
            <div class="mb-3">
                <label for="user-id" class="form-label">User ID</label>
                <input type="text" class="form-control" id="user-id" placeholder="Enter your Telegram User ID" required>
            </div>
            <button type="submit" id="request-btn" class="btn btn-primary w-100">Get OTP</button>
        </form>

        <!-- Step 2: Verify OTP -->
        <form id="verify-otp-form" style="display: none;">
            <div class="mb-3">
                <label for="otp" class="form-label">OTP</label>
                <input type="text" class="form-control" id="otp" placeholder="Enter 6-digit OTP" required>
            </div>
            <button type="submit" id="verify-btn" class="btn btn-primary w-100">Verify & Login</button>
            <button type="button" id="back-btn" class="btn btn-link w-100 mt-2 text-decoration-none text-white-50">Back to User ID</button>
        </form>

        <div id="status-message" class="alert alert-info mt-3" style="display: none;"></div>
        <div id="error-message" class="alert alert-danger mt-3" style="display: none;"></div>
    </div>

    <script src="config.js"></script>
    <script>
        const requestForm = document.getElementById('request-otp-form');
        const verifyForm = document.getElementById('verify-otp-form');
        const userIdInput = document.getElementById('user-id');
        const otpInput = document.getElementById('otp');
        const statusMessage = document.getElementById('status-message');
        const errorMessage = document.getElementById('error-message');
        const requestBtn = document.getElementById('request-btn');
        const verifyBtn = document.getElementById('verify-btn');
        const backBtn = document.getElementById('back-btn');

        function showMessage(type, text) {
            statusMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            if (type === 'status') {
                statusMessage.textContent = text;
                statusMessage.style.display = 'block';
            } else {
                errorMessage.textContent = text;
                errorMessage.style.display = 'block';
            }
        }

        requestForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = userIdInput.value;
            requestBtn.disabled = true;
            requestBtn.innerHTML = '<div class="btn-loader"></div>';
            showMessage('status', 'Requesting OTP...');

            try {
                const response = await fetch(`${API_BASE_URL}/api/request-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.status === 'link') {
                        showMessage('status', 'Please open this link to get your OTP:');
                        const link = document.createElement('a');
                        link.href = data.link;
                        link.target = '_blank';
                        link.className = 'btn btn-success w-100 mt-2';
                        link.textContent = 'Get OTP via Bot';
                        statusMessage.appendChild(link);
                    } else {
                        showMessage('status', 'OTP has been sent to your bot!');
                    }
                    requestForm.style.display = 'none';
                    verifyForm.style.display = 'block';
                } else {
                    showMessage('error', data.detail || 'Failed to request OTP.');
                }
            } catch (error) {
                showMessage('error', 'An error occurred. Please try again.');
            } finally {
                requestBtn.disabled = false;
                requestBtn.textContent = 'Get OTP';
            }
        });

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = userIdInput.value;
            const otp = otpInput.value;
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<div class="btn-loader"></div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, otp: otp })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('authToken', data.token);
                    window.location.href = 'index.html';
                } else {
                    showMessage('error', data.detail || 'Invalid OTP.');
                }
            } catch (error) {
                showMessage('error', 'An error occurred. Please try again.');
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.textContent = 'Verify & Login';
            }
        });

        backBtn.addEventListener('click', () => {
            verifyForm.style.display = 'none';
            requestForm.style.display = 'block';
            statusMessage.style.display = 'none';
            errorMessage.style.display = 'none';
        });
        
    </script>
</body>
</html>
