<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adult - TG⚡FLIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #141414;
            color: #fff;
        }

        /* GRID */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(200px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .file-grid {
                grid-template-columns: 1fr !important;
                gap: 1rem;
            }

            #welcome-message {
                font-size: 1.5rem;
            }

            #search-container {
                width: 100% !important;
                margin-left: 0 !important;
            }

            #search-input {
                flex-grow: 1;
            }

            .d-flex.justify-content-between {
                flex-direction: column;
                align-items: stretch !important;
            }

            .d-flex.justify-content-between>* {
                margin-bottom: 0.5rem;
            }
        }

        /* TILE */
        .file-tile {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 10px;
            aspect-ratio: auto;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tile-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(10px) brightness(0.6);
            transform: scale(1.2);
        }

        .tile-poster {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.3s ease-in-out, transform 0.3s;
            opacity: 0;
        }

        .tile-poster.loaded {
            opacity: 1;
        }

        .file-tile:hover .tile-poster {
            transform: scale(1.05);
        }

        /* Title Overlay */
        .file-title {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            opacity: 1;
            z-index: 3;
            padding: 0 10px;
            box-sizing: border-box;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            word-break: break-all;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        /* No Image Tile */
        .file-tile.no-image {
            background-color: #222;
            border: 1px solid #333;
        }

        .file-tile.no-image::after {
            display: block;
        }

        /* Gradient Overlay */
        .file-tile::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            z-index: 2;
        }

        /* Tile loader */
        .tile-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            pointer-events: none;
        }

        .tile-loader div {
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Pagination */
        .pagination .page-link {
            background-color: #222;
            border-color: #333;
            color: #fff;
        }

        .pagination .page-item.active .page-link {
            background-color: #e50914 !important;
            border: none;
        }

        .btn-danger,
        .btn-danger:focus,
        .btn-danger:active {
            background-color: #e50914 !important;
            border-color: #e50914 !important;
            box-shadow: none !important;
        }

        .btn-danger:hover {
            background-color: #b20710 !important;
            border-color: #b20710 !important;
        }

        .file-tile,
        .btn-danger,
        .btn-outline-light,
        .page-link {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Fullscreen loader */
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #e50914;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        .loader-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Age Verification Modal */
        #age-verification-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .age-modal-content {
            background-color: #1f1f1f;
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }
    </style>
</head>

<body>
    <!-- Age Verification Modal -->
    <div id="age-verification-modal">
        <div class="age-modal-content">
            <h2 class="text-danger mb-4">Age Verification</h2>
            <p class="mb-4">You must be at least 18 years old to view this content. Are you 18 or older?</p>
            <div class="d-flex justify-content-center gap-3">
                <button id="verify-yes" class="btn btn-danger px-4">Yes</button>
                <button id="verify-no" class="btn btn-outline-light px-4">No</button>
            </div>
        </div>
    </div>

    <div class="container mt-4" id="main-content" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 style="color: red; text-align: center; font-family: Arial, sans-serif;">TG⚡FLIX</h1>
            <h2 id="welcome-message">Welcome!</h2>
            <div class="d-flex align-items-center w-50 ms-2" id="search-container">
                <input id="search-input" class="form-control me-2" type="search" placeholder="Search"
                    aria-label="Search">
                <button id="toggle-config"
                    class="btn btn-outline-light d-flex align-items-center justify-content-center p-2" title="Settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                        class="bi bi-gear-fill" viewBox="0 0 16 16">
                        <path
                            d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Settings -->
        <div id="channel-config-card" class="card bg-dark mb-4 border-secondary" style="display: none;">
            <div class="card-body">
                <h5 class="card-title text-danger">Settings</h5>
                <div class="mb-3 d-flex justify-content-center gap-2">
                    <button onclick="window.location.href='index.html'" class="btn btn-danger w-50">Home</button>
                    <button onclick="window.location.href='music.html'" class="btn btn-danger w-50">Music</button>
                </div>
            </div>
        </div>

        <div class="d-flex flex-wrap justify-content-center gap-2 mb-4">
            <button id="recent-btn" class="btn btn-danger">Sort by Recently Added</button>
            <button id="oldest-btn" class="btn btn-outline-light">Sort by Oldest</button>
        </div>

        <div id="file-grid" class="file-grid"></div>

        <nav aria-label="Page navigation">
            <ul id="pagination" class="pagination justify-content-center mt-4"></ul>
        </nav>

        <div class="d-flex justify-content-center mt-2 flex-wrap">
            <input type="number" id="page-input" class="form-control" style="width: 100px;" placeholder="Page">
            <button id="goto-page" class="btn btn-danger ms-2">Go</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const searchInput = document.getElementById('search-input');
        const recentBtn = document.getElementById('recent-btn');
        const oldestBtn = document.getElementById('oldest-btn');
        const fileGrid = document.getElementById('file-grid');
        const paginationContainer = document.getElementById('pagination');
        const welcomeMessage = document.getElementById('welcome-message');
        const pageInput = document.getElementById('page-input');
        const gotoPageBtn = document.getElementById('goto-page');
        const toggleConfigBtn = document.getElementById('toggle-config');
        const channelConfigCard = document.getElementById('channel-config-card');
        const ageModal = document.getElementById('age-verification-modal');
        const verifyYes = document.getElementById('verify-yes');
        const verifyNo = document.getElementById('verify-no');
        const mainContent = document.getElementById('main-content');
        const token = localStorage.getItem('authToken');
        let currentSort = 'recent';
        let currentSearch = '';
        let currentPage = 1;
        let totalPages = 1;

        function debounce(func, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        }

        async function fetchWithAuth(url, options = {}) {
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: {
                        ...options.headers,
                        Authorization: `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                    return;
                }
                return response;
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        async function fetchFiles() {
            fileGrid.innerHTML = '<div class="loader-wrapper"><div class="loader"></div></div>';
            const url = `${API_BASE_URL}/api/adult?page=${currentPage}&search=${currentSearch}&sort=${currentSort}`;
            const response = await fetchWithAuth(url);
            if (!response?.ok) return;

            const data = await response.json();
            totalPages = data.total_pages;

            displayFiles(data.files);
            setupPagination(totalPages, data.current_page);

            setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);
        }

        async function loadUser() {
            const response = await fetchWithAuth(`${API_BASE_URL}/api/user/me`);
            if (response?.ok) {
                const data = await response.json();
                welcomeMessage.textContent = `Welcome, ${data.first_name}!`;
            }
        }

        function displayFiles(files) {
            fileGrid.innerHTML = '';

            if (!files?.length) {
                fileGrid.innerHTML = '<p>No files found.</p>';
                return;
            }

            files.forEach(file => fileGrid.appendChild(createFileTile(file)));
        }

        function createFileTile(file) {
            const tile = document.createElement('div');
            tile.className = 'file-tile';

            if (!file.poster_url) {
                tile.classList.add('no-image');
            } else {
                const spinner = document.createElement('div');
                spinner.className = 'tile-loader';
                spinner.innerHTML = '<div></div>';
                tile.appendChild(spinner);

                const background = document.createElement('div');
                background.className = 'tile-background';
                background.style.backgroundImage = `url('${file.poster_url}')`;
                tile.appendChild(background);

                const img = document.createElement('img');
                img.className = 'tile-poster';
                img.src = file.poster_url;
                img.loading = 'lazy';

                img.onload = () => {
                    spinner.style.display = 'none';
                    img.classList.add('loaded');
                };
                img.onerror = () => {
                    tile.classList.add('no-image');
                    spinner.style.display = 'none';
                    if (img.parentNode) tile.removeChild(img);
                    if (background.parentNode) tile.removeChild(background);
                };

                tile.appendChild(img);
            }

            const titleLink = document.createElement('div');
            titleLink.className = 'file-title';
            titleLink.textContent = file.title;

            tile.appendChild(titleLink);

            tile.onclick = () => {
                window.location.href = `simple_details.html?file_id=${file._id}`;
            };

            return tile;
        }

        function setupPagination(totalPages, current) {
            paginationContainer.innerHTML = '';

            if (current > 1) {
                paginationContainer.innerHTML += `
                    <li class="page-item">
                        <a class="page-link" href="#" data-page="${current - 1}">Previous</a>
                    </li>`;
            }

            paginationContainer.innerHTML += `
                <li class="page-item active">
                    <span class="page-link">${current} / ${totalPages}</span>
                </li>`;

            if (current < totalPages) {
                paginationContainer.innerHTML += `
                    <li class="page-item">
                        <a class="page-link" href="#" data-page="${current + 1}">Next</a>
                    </li>`;
            }
        }

        paginationContainer.addEventListener('click', (e) => {
            if (e.target.tagName === 'A') {
                e.preventDefault();
                const page = Number(e.target.dataset.page);
                currentPage = page;
                fetchFiles();
            }
        });

        gotoPageBtn.addEventListener('click', () => {
            const page = parseInt(pageInput.value);
            if (!isNaN(page) && page >= 1 && page <= totalPages) {
                currentPage = page;
                fetchFiles();
            } else {
                alert(`Enter a number between 1 and ${totalPages}`);
            }
        });

        function updateButtonStyles() {
            recentBtn.className = currentSort === 'recent' ? 'btn btn-danger' : 'btn btn-outline-light';
            oldestBtn.className = currentSort === 'oldest' ? 'btn btn-danger' : 'btn btn-outline-light';
        }

        searchInput.addEventListener('input', debounce((e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            fetchFiles();
        }, 600));

        recentBtn.addEventListener('click', () => {
            currentSort = 'recent';
            updateButtonStyles();
            currentPage = 1;
            fetchFiles();
        });

        oldestBtn.addEventListener('click', () => {
            currentSort = 'oldest';
            updateButtonStyles();
            currentPage = 1;
            fetchFiles();
        });

        toggleConfigBtn.addEventListener('click', () => {
            if (channelConfigCard.style.display === 'none') {
                channelConfigCard.style.display = 'block';
                toggleConfigBtn.classList.remove('btn-outline-light');
                toggleConfigBtn.classList.add('btn-danger');
            } else {
                channelConfigCard.style.display = 'none';
                toggleConfigBtn.classList.remove('btn-danger');
                toggleConfigBtn.classList.add('btn-outline-light');
            }
        });

        verifyYes.addEventListener('click', () => {
            localStorage.setItem('ageVerified', 'true');
            ageModal.style.display = 'none';
            mainContent.style.display = 'block';
            initializeApp();
        });

        verifyNo.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        async function verifyAuth() {
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/api/user/verify`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    window.location.href = 'login.html';
                    return false;
                }
                return response.ok;
            } catch (error) {
                console.error('Auth verification failed:', error);
                return false;
            }
        }

        async function initializeApp() {
            const authorized = await verifyAuth();
            if (!authorized) return;

            fetchFiles();
            loadUser();
            updateButtonStyles();
        }

        if (localStorage.getItem('ageVerified') === 'true') {
            ageModal.style.display = 'none';
            mainContent.style.display = 'block';
            initializeApp();
        }
    </script>
</body>

</html>
